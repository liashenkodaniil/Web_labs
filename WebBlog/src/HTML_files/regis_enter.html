<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urban Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(26, 28, 30, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .urban-gradient {
            background: linear-gradient(to bottom, rgba(15, 17, 19, 0.7), #0f1113);
        }
    </style>
</head>
<body class="bg-[#0f1113] text-white min-h-screen">

    <header class="relative z-10 p-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="main.html" class="flex items-center gap-2 text-xs font-bold tracking-[0.3em] uppercase hover:text-cyan-400 transition-all group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Повернутись
            </a>
            <div class="text-cyan-400 font-bold tracking-[0.4em] uppercase italic">Urban Architect</div>
        </div>
    </header>

    <main class="relative z-10 max-w-6xl mx-auto px-6 py-12 lg:py-24">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-start">
            
            <section class="glass p-10 rounded-2xl shadow-2xl">
                <div class="mb-8">
                    <h2 class="text-3xl font-bold uppercase tracking-tighter mb-2">Вхід</h2>
                    <p class="text-gray-400 text-sm italic">З поверненням до мегаполіса</p>
                </div>
                
                <form action="#" class="space-y-5">
                    <div>
                        <label class="block text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-2">Логін або Email</label>
                        <input type="text" class="w-full bg-black/30 border border-white/10 rounded-md px-4 py-3 focus:outline-none focus:border-cyan-400/50 focus:ring-1 focus:ring-cyan-400/50 transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-2">Пароль</label>
                        <input type="password" class="w-full bg-black/30 border border-white/10 rounded-md px-4 py-3 focus:outline-none focus:border-cyan-400/50 focus:ring-1 focus:ring-cyan-400/50 transition-all text-sm">
                    </div>
                    <div class="flex items-center justify-between pt-2">
                        <label class="flex items-center gap-2 text-xs text-gray-400 cursor-pointer">
                            <input type="checkbox" class="accent-cyan-400"> Запам'ятати мене
                        </label>
                        <a href="#" class="text-xs text-cyan-400/70 hover:text-cyan-400 transition">Забули пароль?</a>
                    </div>
                    <button class="w-full bg-white text-black font-bold py-4 rounded-md uppercase tracking-[0.2em] text-xs hover:bg-cyan-400 transition-all duration-300 mt-4">
                        Увійти
                    </button>
                </form>
            </section>

            <section class="glass p-10 rounded-2xl shadow-2xl border-t-4 border-t-cyan-400">
                <div class="mb-8">
                    <h2 class="text-3xl font-bold uppercase tracking-tighter mb-2 text-cyan-400">Реєстрація</h2>
                    <p class="text-gray-400 text-sm italic">Станьте частиною архітектурної спільноти</p>
                </div>
                
                <form action="#" class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-2">Ім'я</label>
                            <input type="text" class="w-full bg-black/30 border border-white/10 rounded-md px-4 py-3 focus:outline-none focus:border-cyan-400/50 transition-all text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-2">Прізвище</label>
                            <input type="text" class="w-full bg-black/30 border border-white/10 rounded-md px-4 py-3 focus:outline-none focus:border-cyan-400/50 transition-all text-sm">
                        </div>
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-2">Email</label>
                        <input type="email" class="w-full bg-black/30 border border-white/10 rounded-md px-4 py-3 focus:outline-none focus:border-cyan-400/50 transition-all text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-2">Придумайте пароль</label>
                        <input type="password" class="w-full bg-black/30 border border-white/10 rounded-md px-4 py-3 focus:outline-none focus:border-cyan-400/50 transition-all text-sm">
                    </div>
                    <div class="text-[10px] text-gray-500 leading-relaxed italic">
                        Натискаючи кнопку, ви погоджуєтесь з правилами спільноти та політикою конфіденційності.
                    </div>
                    <button class="w-full border-2 border-cyan-400 text-cyan-400 font-bold py-4 rounded-md uppercase tracking-[0.2em] text-xs hover:bg-cyan-400 hover:text-black transition-all duration-300 mt-4">
                        Створити профіль
                    </button>
                </form>
            </section>

        </div>
    </main>

    <footer class="relative z-10 text-center py-10 opacity-40">
        <p class="text-[9px] uppercase tracking-[0.5em]">&copy; 2026 Urban Architect / Developed for the Future</p>
    </footer>

</body>
</html>
